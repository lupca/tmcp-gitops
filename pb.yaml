# pb.yaml
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pb-secrets
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: "30s"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: pb-secrets-k8s
    creationPolicy: Owner
  data:
    - secretKey: PB_ADMIN_PASSWORD
      remoteRef:
        key: tmcp/video-creater
        property: PB_ADMIN_PASSWORD
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pb-data-pvc
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 1Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pocketbase
spec:
  replicas: 1 # Bắt buộc là 1 vì dùng SQLite
  selector:
    matchLabels: { app: pocketbase }
  template:
    metadata: { labels: { app: pocketbase } }
    spec:
      containers:
      - name: pb
        image: lupca/tmcp-dashboard:v0.0.22
        ports: [{ containerPort: 8090 }]
        env:
        - name: PB_ADMIN_EMAIL
          value: "admin@admin.com"
        envFrom:
        - secretRef:
            name: pb-secrets-k8s
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8090
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8090
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: data
          mountPath: /pb/pb_data
      volumes:
      - name: data
        persistentVolumeClaim: { claimName: pb-data-pvc }
---
apiVersion: v1
kind: Service
metadata:
  name: pb-service
spec:
  selector: { app: pocketbase }
  ports: [{ port: 80, targetPort: 8090 }]