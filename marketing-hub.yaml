# marketing-hub.yaml – Marketing Hub SPA (React + Vite)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketing-hub
spec:
  replicas: 2
  selector:
    matchLabels: { app: hub }
  template:
    metadata: { labels: { app: hub } }
    spec:
      containers:
      - name: hub
        image: lupca/tmcp-marketing-hub:v0.0.15
        ports: [{ containerPort: 80 }]
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hub-service
spec:
  selector: { app: hub }
  ports: [{ port: 80, targetPort: 80 }]
